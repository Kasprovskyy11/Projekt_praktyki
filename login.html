<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Logowanie</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form id="loginForm" class="form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Hasło" required />
      <div id="komunikat"></div>
      <button type="submit" id="button">Zaloguj</button>
    </form>

    <script>
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const button = document.getElementById("button");

      function checkValues() {
        if (email.value && password.value) {
          button.removeAttribute("disabled");
        } else {
          button.setAttribute("disabled", true);
        }
      }
      checkValues();

      email.addEventListener("input", checkValues);
      password.addEventListener("input", checkValues);

      const token = localStorage.getItem("token");

      if (token) {
        fetch("http://localhost:8080/me.php", {
          method: "GET",
          headers: { Authorization: "Bearer " + token },
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.user_id) {
              window.location.href = "dashboard.html";
            }
          });
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const response = await fetch("http://localhost:8080", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email.value,
              password: password.value,
            }),
          });

          const data = await response.json();

          if (data.status === "success") {
            localStorage.setItem("token", data.token);
            document.getElementById("komunikat").innerText = "Zalogowano!";
            setTimeout((window.location.href = "dashboard.html"), 1000);
          } else {
            document.getElementById("komunikat").innerText =
              "Błąd logowania, spróbuj ponownie!";
          }
        });
    </script>
  </body>
</html>
